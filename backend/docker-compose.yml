services:
  postgres:
    image: postgres:16
    container_name: freshflow-postgres

    environment:
      POSTGRES_DB: freshflow
      POSTGRES_USER: freshflow_user
      POSTGRES_PASSWORD: freshflow_pass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: freshflow-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: